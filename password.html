<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #FFF5D6 0%, #F5E0A0 50%, #E8A830 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #4A1A0A;
    }

    .container {
      background: rgba(255, 255, 255, 0.85);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 32px 64px -16px rgba(0, 0, 0, 0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    h1 {
      margin-bottom: 1.5rem;
      font-size: 2rem;
      font-weight: 800;
      color: #4A1A0A;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      text-align: left;
      margin: 10px 0 5px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #1a0a04;
    }

    input {
      padding: 14px;
      border: 1.5px solid rgba(212, 148, 28, 0.3);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.03);
      color: #1a0a04;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #D4941C;
      background: white;
      box-shadow: 0 0 0 4px rgba(212, 148, 28, 0.2);
    }

    ::placeholder {
      color: #999;
    }

    button {
      margin-top: 24px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: #4A1A0A;
      color: white;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px -5px rgba(74, 26, 10, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 183, 255, 0.3);
    }

    .error {
      color: #ff6b6b;
      margin-top: 12px;
      font-size: 0.9rem;
      min-height: 20px;
      transition: all 0.3s ease;
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      input,
      button {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Create Password</h1>
    <form id="passwordForm">
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required placeholder="Enter your password" />

      <label for="confirmPassword">Confirm Password:</label>
      <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter password" />

      <button type="button" onclick="validatePasswords()">Proceed</button>
      <div id="errorMsg" class="error"></div>
    </form>
  </div>

  <script>
    function validatePasswords() {
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (password === "" || confirmPassword === "") {
        errorMsg.textContent = "Password fields cannot be empty.";
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = "Password must be at least 6 characters.";
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match.";
        return;
      }

      errorMsg.textContent = "";
      localStorage.setItem("userPassword", password);
      setTimeout(() => {
        window.location.href = "confirmdetails.html";
      }, 1000);
    }
  </script>
</body>
</html>
