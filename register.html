<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Inua Jamii Loans</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #FFF5D6 0%, #F5E0A0 50%, #E8A830 100%);
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .input-field {
      background: rgba(255, 255, 255, 0.5);
      border: 1.5px solid rgba(251, 191, 36, 0.3);
      transition: all 0.2s ease;
    }
    .input-field:focus {
      border-color: #D4941C;
      background: white;
      box-shadow: 0 0 0 4px rgba(212, 148, 28, 0.2);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md glass-panel rounded-3xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] p-10">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-amber-100 mb-4">
        <img src="logo.jpg" alt="Logo" class="w-12">
      </div>
      <h1 class="text-4xl font-extrabold text-slate-900">Welcome Back</h1>
      <p class="text-slate-500 mt-3 font-medium">Log in to manage your Inua Jamii account.</p>
    </div>

    <form class="space-y-6">
      <div>
        <label for="phone" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Phone Number</label>
        <input type="tel" id="phone" name="phone" required placeholder="07xx xxx xxx"
          class="input-field w-full px-5 py-4 rounded-2xl focus:outline-none">
      </div>

      <div>
        <div class="flex justify-between items-center mb-2 ml-1">
          <label for="password" class="block text-sm font-bold text-slate-700">Password</label>
          <a href="#" class="text-xs font-bold text-amber-700 hover:underline">Forgot?</a>
        </div>
        <input type="password" id="password" name="password" required placeholder="••••••••"
          class="input-field w-full px-5 py-4 rounded-2xl focus:outline-none">
      </div>

      <button type="submit"
        class="w-full py-4 bg-[#4A1A0A] hover:bg-[#3D1008] text-white rounded-2xl font-extrabold text-lg shadow-[0_20px_40px_-10px_rgba(74,26,10,0.3)] transition-all transform hover:-translate-y-1 active:scale-95">
        Login
      </button>

      <div class="text-center pt-6 border-t border-slate-200 mt-6">
        <p class="text-slate-500 text-sm">Don't have an account?</p>
        <button type="button" onclick="window.location.href='signup.html';"
          class="mt-3 w-full py-3.5 bg-white border-2 border-[#F5E0A0] text-[#4A1A0A] hover:bg-[#FFF8E7] rounded-2xl font-extrabold transition-all">
          Create New Account
        </button>
      </div>
    </form>
  </div>

</body>
</html>
