<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Inua Jamii Loans</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #fff9c4 0%, #fdd835 50%, #fb8c00 100%);
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .input-field {
      background: rgba(255, 255, 255, 0.5);
      border: 1.5px solid rgba(251, 191, 36, 0.3);
      transition: all 0.2s ease;
    }
    .input-field:focus {
      border-color: #d97706;
      background: white;
      box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.2);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-xl glass-panel rounded-3xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] p-8 my-8">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-100 mb-4">
        <img src="logo.jpg" alt="Logo" class="w-10">
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900">Create Account</h1>
      <p class="text-slate-500 mt-2">Join thousands of Kenyans growing with Inua Jamii.</p>
    </div>

    <form id="signupForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="md:col-span-1">
        <label for="firstname" class="block text-sm font-bold text-slate-700 mb-2 ml-1">First Name</label>
        <input type="text" id="firstname" name="firstname" required placeholder="e.g. John"
          class="input-field w-full px-5 py-3.5 rounded-2xl focus:outline-none">
      </div>

      <div class="md:col-span-1">
        <label for="lastname" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Last Name</label>
        <input type="text" id="lastname" name="lastname" required placeholder="e.g. Doe"
          class="input-field w-full px-5 py-3.5 rounded-2xl focus:outline-none">
      </div>

      <div class="md:col-span-2">
        <label for="phone" class="block text-sm font-bold text-slate-700 mb-2 ml-1">M-Pesa Phone Number</label>
        <input type="tel" id="phone" name="phone" required placeholder="07xx xxx xxx"
          class="input-field w-full px-5 py-3.5 rounded-2xl focus:outline-none">
      </div>

      <div class="md:col-span-1">
        <label for="idnumber" class="block text-sm font-bold text-slate-700 mb-2 ml-1">ID Number</label>
        <input type="text" id="idnumber" name="idnumber" required placeholder="Identity Card No."
          class="input-field w-full px-5 py-3.5 rounded-2xl focus:outline-none">
      </div>

      <div class="md:col-span-1">
        <label for="dob" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Date of Birth</label>
        <input type="date" id="dob" name="dob" required
          class="input-field w-full px-5 py-3.5 rounded-2xl focus:outline-none">
      </div>

      <div class="md:col-span-2">
        <label for="email" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="name@example.com"
          class="input-field w-full px-5 py-3.5 rounded-2xl focus:outline-none">
      </div>

      <div class="md:col-span-1">
        <label for="location" class="block text-sm font-bold text-slate-700 mb-2 ml-1">County</label>
        <select id="location" name="location" required
          class="input-field w-full px-5 py-3.5 rounded-2xl focus:outline-none appearance-none bg-no-repeat bg-[right_1.25rem_center] bg-[length:1em_1em]"
          style="background-image: url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22currentColor%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')">
          <option value="">--Select County--</option>
          <option value="Mombasa">Mombasa</option><option value="Kwale">Kwale</option><option value="Kilifi">Kilifi</option>
          <option value="Tana River">Tana River</option><option value="Lamu">Lamu</option><option value="Taita-Taveta">Taita-Taveta</option>
          <option value="Garissa">Garissa</option><option value="Wajir">Wajir</option><option value="Mandera">Mandera</option>
          <option value="Marsabit">Marsabit</option><option value="Isiolo">Isiolo</option><option value="Meru">Meru</option>
          <option value="Tharaka-Nithi">Tharaka-Nithi</option><option value="Embu">Embu</option><option value="Kitui">Kitui</option>
          <option value="Machakos">Machakos</option><option value="Makueni">Makueni</option><option value="Nyandarua">Nyandarua</option>
          <option value="Nyeri">Nyeri</option><option value="Kirinyaga">Kirinyaga</option><option value="Murang'a">Murang'a</option>
          <option value="Kiambu">Kiambu</option><option value="Turkana">Turkana</option><option value="West Pokot">West Pokot</option>
          <option value="Samburu">Samburu</option><option value="Trans Nzoia">Trans Nzoia</option><option value="Uasin Gishu">Uasin Gishu</option>
          <option value="Elgeyo-Marakwet">Elgeyo-Marakwet</option><option value="Nandi">Nandi</option><option value="Baringo">Baringo</option>
          <option value="Laikipia">Laikipia</option><option value="Nakuru">Nakuru</option><option value="Narok">Narok</option>
          <option value="Kajiado">Kajiado</option><option value="Kericho">Kericho</option><option value="Bomet">Bomet</option>
          <option value="Kakamega">Kakamega</option><option value="Vihiga">Vihiga</option><option value="Bungoma">Bungoma</option>
          <option value="Busia">Busia</option><option value="Siaya">Siaya</option><option value="Kisumu">Kisumu</option>
          <option value="Homa Bay">Homa Bay</option><option value="Migori">Migori</option><option value="Nyamira">Nyamira</option>
          <option value="Nairobi">Nairobi</option>
        </select>
      </div>

      <div class="md:col-span-1">
        <label for="Gender" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Gender</label>
        <select id="Gender" name="Gender" required
          class="input-field w-full px-5 py-3.5 rounded-2xl focus:outline-none appearance-none bg-no-repeat bg-[right_1.25rem_center] bg-[length:1em_1em]"
          style="background-image: url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22currentColor%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')">
          <option value="">--Select Gender--</option>
          <option value="Female">Female</option>
          <option value="Male">Male</option>
        </select>
      </div>

      <button type="button" id="submitBtn"
        class="md:col-span-2 mt-4 py-4 bg-amber-600 hover:bg-amber-700 text-white rounded-2xl font-extrabold text-lg shadow-[0_20px_40px_-10px_rgba(217,119,6,0.3)] transition-all transform hover:-translate-y-1 active:scale-95">
        Create Account
      </button>

      <div class="md:col-span-2 text-center mt-6">
        <p class="text-slate-500 text-sm">Already have an account? <a href="register.html" class="text-amber-700 font-bold hover:underline">Log in</a></p>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('submitBtn').addEventListener('click', function () {
      let form = document.getElementById('signupForm');
      if (!form.checkValidity()) {
        alert("Please fill in all required fields.");
        return;
      }

      localStorage.setItem('lastname', document.getElementById('lastname').value);
      localStorage.setItem('firstname', document.getElementById('firstname').value);
      localStorage.setItem('phone', document.getElementById('phone').value);
      localStorage.setItem('idnumber', document.getElementById('idnumber').value);
      localStorage.setItem('email', document.getElementById('email').value);
      localStorage.setItem('location', document.getElementById('location').value);
      localStorage.setItem('dob', document.getElementById('dob').value);
      localStorage.setItem('Gender', document.getElementById('Gender').value);

      window.location.href = 'password.html';
    });
  </script>
</body>
</html>
